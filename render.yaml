services:
  - type: cron
    name: pinnacle-monitor
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    schedule: "*/5 * * * *"
    startCommand: python monitor.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
