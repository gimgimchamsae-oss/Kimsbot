name: public-betting

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip + playwright
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium
          restore-keys: playwright-${{ runner.os }}-

      - name: Install dependencies
        run: pip install playwright supabase

      - name: Install Chromium
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: |
          python - <<'EOF'
          import asyncio
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as pw:
                  browser = await pw.chromium.launch(headless=True, args=["--no-sandbox","--disable-dev-shm-usage"])
                  page = await browser.new_page(user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36")
                  print("V3 실행중")
                  await page.goto("https://www.sportsbettingdime.com/mlb/public-betting-trends/", wait_until="domcontentloaded", timeout=60000)
                  try:
                      await page.wait_for_selector("tr.bg-base-100", timeout=20000)
                  except:
                      pass
                  rows = await page.query_selector_all("tr.bg-base-100")
                  print(f"bg-base-100 rows: {len(rows)}")
                  for i, row in enumerate(rows[:4]):
                      print(f"--- row {i} ---")
                      print((await row.inner_text()).strip()[:400])
                  await browser.close()

          asyncio.run(main())
          EOF
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
