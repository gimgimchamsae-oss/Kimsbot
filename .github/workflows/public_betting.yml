name: public-betting

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip + playwright
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium
          restore-keys: playwright-${{ runner.os }}-

      - name: Install dependencies
        run: pip install playwright supabase

      - name: Install Chromium
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: |
          python - <<'EOF'
          import asyncio
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as pw:
                  browser = await pw.chromium.launch(headless=True, args=["--no-sandbox","--disable-dev-shm-usage"])
                  page = await browser.new_page(user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36")
                  await page.goto("https://www.sportsbettingdime.com/mlb/public-betting-trends/", wait_until="domcontentloaded", timeout=60000)
                  # JS 렌더링 대기 (게임 데이터 로딩까지)
                  await page.wait_for_timeout(8000)
                  # 전체 테이블 행 수 확인
                  all_rows = await page.query_selector_all("table tr")
                  print(f"전체 tr 수: {len(all_rows)}")
                  tables = await page.query_selector_all("table")
                  print(f"테이블 수: {len(tables)}")
                  for t_idx, table in enumerate(tables):
                      rows = await table.query_selector_all("tr")
                      print(f"\n=== 테이블[{t_idx}] 행 수: {len(rows)} ===")
                      for i, row in enumerate(rows[:8]):
                          cls = await row.get_attribute("class") or "(no class)"
                          text = (await row.inner_text()).strip()[:120]
                          print(f"  [{i}] {cls} | {text}")
                  await browser.close()

          asyncio.run(main())
          EOF
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
