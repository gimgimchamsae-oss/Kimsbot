name: pinnacle-bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests supabase
      - uses: actions/cache@v4
        with:
          path: pinnacle_odds.db
          key: pinnacle-db-${{ github.run_number }}
          restore-keys: pinnacle-db-
      - name: Check env
        run: python -c "import os; print('SUPABASE_URL set:', bool(os.environ.get('SUPABASE_URL'))); print('SUPABASE_KEY set:', bool(os.environ.get('SUPABASE_KEY')))"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      - name: Discover basketball/hockey leagues (KBL ID 확인용)
        run: python pinnacle_scraper.py --discover
      - run: python monitor.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
