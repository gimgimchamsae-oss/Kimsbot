name: excapper-collector

# DEPRECATED: 서버 cron(/app/kimkimbot/run_excapper.sh, 매 31,01분)으로 이전됨.
# Excapper.com 차단 문제가 다시 생기면 schedule 복구해서 백업으로 사용.
on:
  workflow_dispatch:   # 수동 실행만 (자동 schedule 비활성화)

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-excapper-paramiko
          restore-keys: pip-

      - name: Install dependencies
        run: pip install paramiko

      - name: Scrape Excapper
        run: |
          python excapper_money.py \
            --mode all --limit 0 --details \
            --markets "Match Odds,Both teams to Score?" \
            --workers 1 --delay 2 --compact \
            --format csv --output excapper_latest_matchodds_btts.csv

      - name: Parse + Push to server (SFTP)
        env:
          EXCAPPER_SSH_HOST: sharpsignal.cloud
          EXCAPPER_SSH_USER: root
          EXCAPPER_SSH_PASS: ${{ secrets.SHARPSIGNAL_SSH_PASS }}
          EXCAPPER_REMOTE_PATH: /app/kimkimbot/excapper.json
          EUR_TO_KRW: "1500"
        run: python excapper_scraper.py

      - name: Show parsed game count
        if: always()
        run: |
          echo "=== 지원 리그만 ==="
          grep -E "(English Premier League|Spanish La Liga|Italian Serie A|German Bundesliga|French Ligue 1|Sky Bet Championship|MLS|J League|K League)" excapper_latest_matchodds_btts.csv | cut -d, -f5,6 | sort -u | head -30
