name: betman-collector

# 베트맨 API가 서버 IP에서 차단됨 → GitHub Actions 우회
# GitHub 무료 plan은 schedule cron이 best-effort라 5분은 자주 skip됨.
# 10분 cron + 매 시각 정각 기준 (안정적).
on:
  schedule:
    - cron: "0,10,20,30,40,50 * * * *"
  workflow_dispatch:

concurrency:
  group: betman-collector
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-betman-paramiko
          restore-keys: pip-

      - name: Install paramiko
        run: pip install paramiko

      - name: Fetch + upload + trigger
        env:
          SSH_HOST: 45.32.250.51
          SSH_USER: root
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          python betman_fetch_and_push.py
